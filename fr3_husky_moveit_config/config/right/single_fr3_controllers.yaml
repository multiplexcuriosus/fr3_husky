controller_names:
  - fr3_joint_trajectory_controller
  - right_franka_gripper

fr3_joint_trajectory_controller:
  action_ns: ""
  type: FollowJointTrajectory
  default: true
  joints:
    - right_fr3_joint1
    - right_fr3_joint2
    - right_fr3_joint3
    - right_fr3_joint4
    - right_fr3_joint5
    - right_fr3_joint6
    - right_fr3_joint7

right_franka_gripper:
    action_ns: gripper_action
    type: GripperCommand
    default: true
    joints:
      - right_fr3_finger_joint1
      - right_fr3_finger_joint2
